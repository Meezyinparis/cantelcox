openapi: 3.0.3

info:
  title: API du service d'identité client CanTelcoX
  description: API pour l'enregistrement des clients, la recherche de clients et l'authentification MFA.
  version: 1.0.0

servers:
  - url: http://localhost:5001
    description: Serveur de développement local

tags:
  - name: Santé
    description: Points de terminaison de vérification de santé
  - name: Clients
    description: Gestion des identités clients
  - name: Authentification
    description: Flux d'authentification MFA

paths:
  /health:
    get:
      tags:
        - Santé
      summary: Vérification de santé
      description: Renvoie le statut du service d'identité client.
      responses:
        '200':
          description: Service sain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy

  /v1/customers/register:
    post:
      tags:
        - Clients
      summary: Enregistrer un client
      description: Crée un nouveau profil d'identité client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCustomerRequest'
            example:
              first_name: John
              last_name: Doe
              email: john@example.com
              phone_number: '5145551234'
      responses:
        '201':
          description: Client enregistré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterCustomerResponse'
              example:
                customer_id: 1
                message: Client enregistré avec succès
        '400':
          description: Corps de requête invalide ou champs manquants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Champ requis manquant
        '409':
          description: Le client existe déjà
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Un client avec cet email existe déjà

  /v1/customers/{customer_id}:
    get:
      tags:
        - Clients
      summary: Obtenir un client par ID
      description: Renvoie le profil client en utilisant l'ID client.
      parameters:
        - name: customer_id
          in: path
          required: true
          description: ID client
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Client trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
              example:
                id: 1
                first_name: John
                last_name: Doe
                email: john@example.com
                phone_number: '5145551234'
        '404':
          description: Client introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Client introuvable

  /v1/auth/mfa/request:
    post:
      tags:
        - Authentification
      summary: Demander un OTP MFA
      description: Génère un OTP MFA pour l'email d'un client enregistré.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaRequest'
            example:
              email: john@example.com
      responses:
        '200':
          description: OTP généré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRequestResponse'
              example:
                message: Code MFA généré
                otp: '123456'
        '400':
          description: Corps de requête invalide ou email manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email requis
        '404':
          description: Email client introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Client introuvable

  /v1/auth/mfa/verify:
    post:
      tags:
        - Authentification
      summary: Vérifier OTP MFA
      description: Vérifie l'OTP MFA et renvoie un jeton JWT si la vérification réussit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
            example:
              email: john@example.com
              otp: '123456'
      responses:
        '200':
          description: MFA vérifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaVerifyResponse'
              example:
                message: MFA vérifié
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
        '400':
          description: Corps de requête invalide, champs manquants ou OTP invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: OTP invalide
        '401':
          description: Échec de la vérification MFA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: OTP invalide ou expiré
        '404':
          description: Email client introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Client introuvable

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
      required:
        - status

    RegisterCustomerRequest:
      type: object
      properties:
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        phone_number:
          type: string
          example: '5145551234'
      required:
        - first_name
        - last_name
        - email
        - phone_number

    RegisterCustomerResponse:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1
        message:
          type: string
          example: Client enregistré avec succès
      required:
        - customer_id

    Customer:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        phone_number:
          type: string
          example: '5145551234'
      required:
        - id
        - first_name
        - last_name
        - email
        - phone_number

    MfaRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john@example.com
      required:
        - email

    MfaRequestResponse:
      type: object
      properties:
        message:
          type: string
          example: Code MFA généré
        otp:
          type: string
          example: '123456'
      required:
        - otp

    MfaVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        otp:
          type: string
          example: '123456'
      required:
        - email
        - otp

    MfaVerifyResponse:
      type: object
      properties:
        message:
          type: string
          example: MFA vérifié
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
      required:
        - message
        - token

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Quelque chose s'est mal passé
      required:
        - error
