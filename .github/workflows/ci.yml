name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-customer-identity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-identity-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: customer-identity-service/src
        run: pytest

  test-commerce:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: commerce-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: commerce-service/src
        run: pytest
