name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-customer-identity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Créer fichier .env
        run: |
          echo "IDENTITY_DB_HOST=mysql_identity" >> .env
          echo "IDENTITY_DB_PORT=3306" >> .env
          echo "IDENTITY_DB_NAME=identity_db" >> .env
          echo "IDENTITY_DB_USER=identity" >> .env
          echo "IDENTITY_DB_PASSWORD=identity" >> .env
          echo "COMMERCE_DB_HOST=mysql_commerce" >> .env
          echo "COMMERCE_DB_PORT=3306" >> .env
          echo "COMMERCE_DB_NAME=commerce_db" >> .env
          echo "COMMERCE_DB_USER=commerce" >> .env
          echo "COMMERCE_DB_PASSWORD=commerce" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env
          echo "JWT_SECRET=CantelcoXLOG4302026SecretKey" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRATION_MINUTES=60" >> .env

      - name: Démarrer les conteneurs
        run: docker compose -f docker_compose.yml up -d --build

      - name: Attendre MySQL Identity
        run: |
          timeout=60
          until docker compose -f docker_compose.yml exec -T mysql_identity mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done

      - name: Exécuter tests Customer Identity
        run: docker compose -f docker_compose.yml exec -T customer_identity_service pytest

      - name: Cleanup
        if: always()
        run: docker compose -f docker_compose.yml down -v

  test-commerce:
    runs-on: ubuntu-latest
    needs: test-customer-identity

    steps:
      - uses: actions/checkout@v4

      - name: Créer fichier .env
        run: |
          echo "IDENTITY_DB_HOST=mysql_identity" >> .env
          echo "IDENTITY_DB_PORT=3306" >> .env
          echo "IDENTITY_DB_NAME=identity_db" >> .env
          echo "IDENTITY_DB_USER=identity" >> .env
          echo "IDENTITY_DB_PASSWORD=identity" >> .env
          echo "COMMERCE_DB_HOST=mysql_commerce" >> .env
          echo "COMMERCE_DB_PORT=3306" >> .env
          echo "COMMERCE_DB_NAME=commerce_db" >> .env
          echo "COMMERCE_DB_USER=commerce" >> .env
          echo "COMMERCE_DB_PASSWORD=commerce" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env
          echo "JWT_SECRET=CantelcoXLOG4302026SecretKey" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRATION_MINUTES=60" >> .env

      - name: Démarrer les conteneurs
        run: docker compose -f docker_compose.yml up -d --build

      - name: Attendre MySQL Commerce
        run: |
          timeout=60
          until docker compose -f docker_compose.yml exec -T mysql_commerce mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done

      - name: Attendre Redis
        run: |
          timeout=60
          until docker compose -f docker_compose.yml exec -T redis redis-cli ping; do
            echo "Waiting for Redis..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "Redis failed to start"
              exit 1
            fi
          done

      - name: Exécuter tests Commerce
        run: docker compose -f docker_compose.yml exec -T commerce_service pytest -s

      - name: Logs Commerce
        if: always()
        run: docker compose -f docker_compose.yml logs commerce_service

      - name: Cleanup
        if: always()
        run: docker compose -f docker_compose.yml down -v
