global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "customer_identity_service"
    scrape_interval: 5s
    static_configs:
      - targets:
          - customer_identity_service:5001

  - job_name: "commerce_service"
    scrape_interval: 5s
    static_configs:
      - targets:
          - commerce_service:5002