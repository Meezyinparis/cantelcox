openapi: 3.0.3
info:
  title: API du service commerce CanTelcoX
  version: 1.0.0

servers:
  - url: http://localhost:5002

paths:
  /:
    get:
      summary: URL de base
      responses:
        '200':
          description: Statut du service

  /health:
    get:
      summary: Vérification de santé
      responses:
        '200':
          description: Le service est sain

  /test/slow/{delay_seconds}:
    get:
      summary: Point de terminaison de test lent
      parameters:
        - name: delay_seconds
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Réponse retardée

  /v1/catalog/plans:
    get:
      summary: Obtenir tous les forfaits actifs
      responses:
        '200':
          description: Liste des forfaits
    post:
      summary: Créer un nouveau forfait
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Forfait créé

  /v1/catalog/plans/{plan_id}:
    get:
      summary: Obtenir le forfait par ID
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Forfait trouvé
        '404':
          description: Forfait introuvable
    delete:
      summary: Supprimer le forfait par ID
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Forfait supprimé
        '404':
          description: Forfait introuvable

  /v1/lines/activate:
    post:
      summary: Activer une ligne mobile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateLineRequest'
      responses:
        '201':
          description: Ligne activée

  /v1/lines/{line_id}:
    get:
      summary: Obtenir la ligne mobile par ID
      parameters:
        - $ref: '#/components/parameters/LineId'
      responses:
        '200':
          description: Ligne trouvée
        '404':
          description: Ligne introuvable
    delete:
      summary: Supprimer la ligne mobile
      parameters:
        - $ref: '#/components/parameters/LineId'
      responses:
        '200':
          description: Ligne supprimée
        '404':
          description: Ligne introuvable

  /v1/customers/{customer_id}/lines:
    get:
      summary: Obtenir toutes les lignes pour un client
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Lignes du client

  /v1/orders:
    post:
      summary: Créer une nouvelle commande
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
          example: abc-123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Commande créée

  /v1/orders/{order_id}:
    get:
      summary: Obtenir la commande par ID
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Commande trouvée
        '404':
          description: Commande introuvable
    delete:
      summary: Supprimer la commande
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Commande supprimée
        '404':
          description: Commande introuvable

  /v1/usage:
    post:
      summary: Créer un enregistrement d'utilisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsageRequest'
      responses:
        '201':
          description: Utilisation créée

  /v1/usage/{line_id}:
    get:
      summary: Obtenir l'utilisation par ID de ligne
      parameters:
        - $ref: '#/components/parameters/LineId'
      responses:
        '200':
          description: Utilisation trouvée
        '404':
          description: Utilisation introuvable

  /v1/invoices:
    post:
      summary: Créer une facture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Facture créée

  /v1/invoices/{invoice_id}:
    get:
      summary: Obtenir la facture par ID
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Facture trouvée
        '404':
          description: Facture introuvable
    delete:
      summary: Supprimer la facture
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Facture supprimée
        '404':
          description: Facture introuvable

  /v1/lines/{line_id}/invoices:
    get:
      summary: Obtenir les factures pour une ligne mobile
      parameters:
        - $ref: '#/components/parameters/LineId'
      responses:
        '200':
          description: Factures de la ligne

  /metrics:
    get:
      summary: Métriques Prometheus
      responses:
        '200':
          description: Métriques au format Prometheus

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PlanId:
      name: plan_id
      in: path
      required: true
      schema:
        type: integer

    LineId:
      name: line_id
      in: path
      required: true
      schema:
        type: integer

    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: integer

    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer

    InvoiceId:
      name: invoice_id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    CreatePlanRequest:
      type: object
      properties:
        name:
          type: string
          example: Basic 20
        description:
          type: string
          example: 20 Go
        monthly_price:
          type: number
          example: 35.00
        data_limit_gb:
          type: integer
          example: 20
        voice_minutes:
          type: integer
          example: 500
        sms_limit:
          type: integer
          example: 500

    ActivateLineRequest:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1
        msisdn:
          type: string
          example: '5145550003'
        sim_number:
          type: string
          example: 'SIM000003'

    CreateOrderRequest:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1
        line_id:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              plan_id:
                type: integer
                example: 1
              quantity:
                type: integer
                example: 1

    CreateUsageRequest:
      type: object
      properties:
        line_id:
          type: integer
          example: 1
        voice_minutes_used:
          type: integer
          example: 120
        sms_used:
          type: integer
          example: 45
        data_used_gb:
          type: number
          example: 8.6
        usage_period:
          type: string
          example: '2026-06'

    CreateInvoiceRequest:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1
        line_id:
          type: integer
          example: 1
        billing_cycle:
          type: string
          example: '2026-06'
        amount:
          type: number
          example: 35.00
